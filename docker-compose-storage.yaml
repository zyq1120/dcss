version: '3.8'

services:
  # MinIO 对象存储服务
  minio:
    image: minio/minio:latest
    container_name: dcs-minio
    restart: always
    ports:
      - "9000:9000"      # API端口
      - "9001:9001"      # Console端口
    environment:
      # 访问密钥
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - ./data/minio:/data
    command: server /data --console-address ":9001"
    networks:
      - dcs-network

  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: dcs-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: newpassword
      MYSQL_DATABASE: dcs
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - ./data/mysql:/var/lib/mysql
    networks:
      - dcs-network

networks:
  dcs-network:
    driver: bridge

