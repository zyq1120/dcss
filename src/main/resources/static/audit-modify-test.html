<body>
<h2>审核保存修改接口测试</h2>
<p>快速验证 <code>POST /api/audit/modify/{fileId}</code> 接口。填写参数后点击“发送请求”即可查看响应与当前提取数据。</p>
<button onclick="fillSampleData()">一键填充示例数据</button>
<button onclick="clearAll()">清空内容</button>

<div class="flex-row">
    <div>
        <label>后端地址（默认 http://localhost:8080）</label>
        <input id="baseUrl" value="http://localhost:8080">
    </div>
    <div>
        <label>文件 ID</label>
        <input id="fileId" placeholder="例如：1234567890">
    </div>
</div>

<h3>账号快速登录（可选）</h3>
<div class="flex-row">
    <div>
        <label>用户名</label>
        <input id="username" value="admin">
    </div>
    <div>
        <label>密码</label>
        <input id="password" type="password" value="admin123">
    </div>
</div>
<button onclick="loginAndFillToken()">登录并填充 Token</button>
<pre id="loginResponse"></pre>

<label>Bearer Token</label>
<textarea id="token" rows="2" placeholder="可选，如需鉴权请填写"></textarea>

<label>修改字段 JSON</label>
<textarea id="payload" rows="12"></textarea>

<button onclick="sendRequest()">发送请求</button>

<h3>接口响应</h3>
<pre id="response"></pre>

<h3>最新提取结果（extract_result）</h3>
<pre id="extract"></pre>

<script>

function fillSampleData() {
    document.getElementById('baseUrl').value = 'http://localhost:8080';
    document.getElementById('fileId').value = '786510591282905088';
    document.getElementById('token').value = sampleToken;
    document.getElementById('payload').value = samplePayload;
}

function clearAll() {
    document.getElementById('fileId').value = '';
    document.getElementById('token').value = '';
    document.getElementById('payload').value = '';
    document.getElementById('response').textContent = '';
    document.getElementById('extract').textContent = '';
    document.getElementById('loginResponse').textContent = '';
}

async function loginAndFillToken() {
    const baseUrl = document.getElementById('baseUrl').value.trim().replace(/\/$/, '');
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    const loginRespEl = document.getElementById('loginResponse');

    if (!username || !password) {
        alert('用户名和密码不能为空');
        return;
    }

    try {
        const res = await fetch(`${baseUrl}/api/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const bodyText = await formatResponseText(res);
        loginRespEl.textContent = bodyText;
        if (res.ok) {
            try {
                const parsed = JSON.parse(bodyText);
                if (parsed?.data?.token) {
                    document.getElementById('token').value = `Bearer ${parsed.data.token}`;
                }
            } catch (err) {
                // 忽略解析失败
            }
        }
    } catch (err) {
        loginRespEl.textContent = '登录失败: ' + err.message;
    }
}

async function sendRequest() {
    const baseUrl = document.getElementById('baseUrl').value.trim().replace(/\/$/, '');
    const fileId = document.getElementById('fileId').value.trim();
    const token = document.getElementById('token').value.trim();
    const payload = document.getElementById('payload').value.trim();
    const responseEl = document.getElementById('response');
    const extractEl = document.getElementById('extract');

    if (!fileId) {
        alert('请填写文件 ID');
        return;
    }

    try {
        const headers = { 'Content-Type': 'application/json' };
        if (token) {
            headers['Authorization'] = 'Bearer ' + token;
        }

        const modifyRes = await fetch(`${baseUrl}/api/audit/modify/${fileId}`, {
            method: 'POST',
            headers,
            body: payload
        });
        const modifyText = await formatResponseText(modifyRes);
        responseEl.textContent = modifyText;

        const detailRes = await fetch(`${baseUrl}/api/review/${fileId}/detail`, { headers });
        const detailText = await formatResponseText(detailRes);
        extractEl.textContent = detailText;
    } catch (err) {
        responseEl.textContent = '请求失败: ' + err.message;
        extractEl.textContent = '';
    }
}

async function formatResponseText(res) {
    const text = await res.text();
    try {
        return JSON.stringify(JSON.parse(text), null, 2);
    } catch (err) {
        return text || `${res.status} ${res.statusText}`;
    }
}
</script>
