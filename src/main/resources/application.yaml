spring:
  application:
    name: dcss
  profiles:
    active: dev
  main:
    allow-bean-definition-overriding: true
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
    default-property-inclusion: non_null

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: cn.masu.dcs.**.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: your-256-bit-secret-your-256-bit-secret-your-256-bit-secret
  expiration: 86400000

minio:
  endpoint: http://119.45.164.129:9000
  access-key: minio
  secret-key: minio123
  bucket-name: document-files
  url-prefix: http://119.45.164.129:9000

ai:
  service:
#    base-url: http://zyq.makeup:5000
    base-url: http://127.0.0.1:5000
    enable-llm-fallback: true
    daily-budget: 20.0
    ocr-confidence-threshold: 0.7
    nlp-confidence-threshold: 0.75
    llm-model: qwen-vl
    llm-provider: qwen

server:
  port: 8080
  servlet:
    context-path: /

logging:
  level:
    cn.masu.dcs: debug
    com.baomidou.mybatisplus: debug
