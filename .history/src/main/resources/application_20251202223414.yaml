spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: document_classification_system_springboot

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://119.45.164.129:3306/dcs?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: newpassword

  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
    default-property-inclusion: non_null

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: cn.masu.dcs.**.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: your-256-bit-secret-your-256-bit-secret-your-256-bit-secret
  expiration: 86400000

minio:
  endpoint: http://119.45.164.129:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: document-files
  url-prefix: http://119.45.164.129:9000

server:
  port: 8080
  servlet:
    context-path: /

logging:
  level:
    cn.masu.dcs: debug
    com.baomidou.mybatisplus: debug
